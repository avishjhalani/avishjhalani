name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics-general:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stats (general)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-stats.svg
          user: avishjhalani
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata

  github-metrics-languages:
    runs-on: ubuntu-latest
    needs: github-metrics-general
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-langs.svg
          user: avishjhalani
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

  github-metrics-achievements:
    runs-on: ubuntu-latest
    needs: github-metrics-languages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-achievements.svg
          user: avishjhalani
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0